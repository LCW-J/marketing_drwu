<!DOCTYPE html>

            --card-bg: #FFFFFF;
        }
        body {
            font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 15px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            width: 100%;
            margin-bottom: 15px;
        }
        .btn:hover {
            background-color: #006666;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .option-btn {
            background-color: white;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            text-align: left;
            padding: 15px 20px;
        }
        .option-btn:hover {
            background-color: #E0F2F1;
        }
        #quiz-section, #result-section {
            display: none;
        }
        .progress-bar {
            height: 6px;
            background-color: #eee;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s;
        }
        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #222;
        }
        .result-title {
            font-size: 22px;
            color: var(--primary-color);
            font-weight: bold;
            margin-bottom: 10px;
        }
        .result-desc {
            background-color: #F0F8FF;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
        .product-rec {
            font-weight: bold;
            color: #D32F2F;
        }
        .result-img {
            width: 70%;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .ig-share-btn {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            border: none;
        }
        .ig-share-btn:hover {
            background: linear-gradient(45deg, #bc1888 0%, #cc2366 25%, #dc2743 50%, #e6683c 75%, #f09433 100%);
        }
    </style>
</head>

    let currentQuestion = 0;
    let scores = { dry: 0, sensitive: 0, aging: 0, oil: 0, dull: 0, wrinkle: 0 };

    function startQuiz() {
        document.getElementById('start-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const qData = questions[currentQuestion];
        document.getElementById('question-text').innerText = qData.q;
        const progressPercent = (currentQuestion / questions.length) * 100;
        document.getElementById('progress').style.width = progressPercent + '%';
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        qData.options.forEach(option => {
            const btn = document.createElement('button');
            btn.className = 'btn option-btn';
            btn.innerText = option.text;
            btn.onclick = () => selectOption(option.type);
            optionsContainer.appendChild(btn);
        });
    }

    function selectOption(type) {
        if (type !== "none" && scores[type] !== undefined) {
            scores[type]++;
        }
        currentQuestion++;
        if (currentQuestion < questions.length) {
            showQuestion();
        } else {
            calculateResult();
        }
    }

    function calculateResult() {
        let maxScore = -1;
        let finalType = "dry";
        for (let type in scores) {
            if (scores[type] > maxScore) {
                maxScore = scores[type];
                finalType = type;
            }
        }
        const finalResult = results[finalType];
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('result-persona').innerText = finalResult.persona;
        document.getElementById('result-img').src = finalResult.img;
        document.getElementById('result-text').innerText = finalResult.text;
        document.getElementById('result-product').innerText = finalResult.product;
        document.getElementById('shop-btn').dataset.link = finalResult.link;
    }
</script>
